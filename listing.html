<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading listing… — NyumbaKisumu</title>
  <meta name="description" content="View apartment details on NyumbaKisumu"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:       #0F6E56;
      --green-light: #E1F5EE;
      --green-mid:   #1D9E75;
      --green-dark:  #085041;
      --gold:        #BA7517;
      --gold-light:  #FAEEDA;
      --text:        #1a1a18;
      --text-2:      #4a4a46;
      --text-3:      #888780;
      --border:      #e0ded8;
      --surface:     #f7f6f2;
      --white:       #ffffff;
      --radius:      10px;
      --radius-lg:   16px;
      --shadow:      0 1px 4px rgba(0,0,0,0.07), 0 6px 16px rgba(0,0,0,0.06);
      --shadow-lg:   0 8px 40px rgba(0,0,0,0.14);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; color: var(--text); background: var(--surface); font-size: 15px; line-height: 1.6; }
    a { text-decoration: none; color: inherit; }
    img { display: block; max-width: 100%; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }

    /* ── NAVBAR ── */
    nav {
      position: sticky; top: 0; z-index: 200;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 64px;
      background: var(--white); border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Playfair Display', serif; font-size: 20px; color: var(--green-dark);
    }
    .logo-icon {
      width: 34px; height: 34px; background: var(--green); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; }
    .nav-links { display: flex; align-items: center; gap: 8px; }
    .nav-link { font-size: 14px; color: var(--text-2); padding: 8px 14px; border-radius: var(--radius); transition: background .15s; }
    .nav-link:hover { background: var(--surface); }
    .btn { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; padding: 9px 18px; border-radius: var(--radius); transition: all .15s; cursor: pointer; border: none; }
    .btn-primary { background: var(--green); color: white; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-outline { background: transparent; color: var(--text-2); border: 1.5px solid var(--border); }
    .btn-outline:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }

    /* ── BREADCRUMB ── */
    .breadcrumb {
      padding: 14px 32px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-3);
    }
    .breadcrumb a { color: var(--text-3); transition: color .15s; }
    .breadcrumb a:hover { color: var(--green); }
    .breadcrumb svg { width: 12px; height: 12px; stroke: var(--border); fill: none; stroke-width: 2.5; }
    .breadcrumb-current { color: var(--text-2); font-weight: 500; }

    /* ── MAIN LAYOUT ── */
    .listing-wrap {
      max-width: 1180px; margin: 0 auto;
      padding: 28px 32px 60px;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 32px;
      align-items: start;
    }
    .listing-main { min-width: 0; }
    .listing-sidebar { position: sticky; top: 88px; }

    /* ── GALLERY ── */
    .gallery { border-radius: var(--radius-lg); overflow: hidden; background: #1a1a18; margin-bottom: 28px; position: relative; }
    .gallery-main {
      position: relative; height: 480px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
    }
    .gallery-main img { width: 100%; height: 100%; object-fit: cover; transition: opacity .25s; }
    .gallery-main .no-photo {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      color: var(--text-3);
    }
    .gallery-main .no-photo svg { width: 52px; height: 52px; stroke: var(--border); fill: none; stroke-width: 1.5; }
    .gallery-main .no-photo span { font-size: 14px; }

    /* Gallery arrows */
    .gallery-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(255,255,255,0.92); box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s; z-index: 5; border: none;
    }
    .gallery-arrow:hover { background: white; transform: translateY(-50%) scale(1.06); }
    .gallery-arrow svg { width: 16px; height: 16px; stroke: var(--text); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .gallery-arrow.prev { left: 14px; }
    .gallery-arrow.next { right: 14px; }
    .gallery-arrow.hidden { display: none; }

    /* Photo counter */
    .gallery-counter {
      position: absolute; bottom: 14px; right: 14px;
      background: rgba(0,0,0,0.55); color: white;
      font-size: 12px; font-weight: 600; padding: 4px 12px;
      border-radius: 20px; letter-spacing: .02em;
    }

    /* Expand icon */
    .gallery-expand {
      position: absolute; top: 14px; right: 14px;
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s;
    }
    .gallery-expand:hover { background: rgba(0,0,0,0.65); }
    .gallery-expand svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2; }

    /* Thumbnails */
    .gallery-thumbs {
      display: flex; gap: 6px; padding: 8px;
      background: rgba(0,0,0,0.06);
      overflow-x: auto; scrollbar-width: none;
    }
    .gallery-thumbs::-webkit-scrollbar { display: none; }
    .gallery-thumb {
      width: 72px; height: 52px; flex-shrink: 0; border-radius: 6px;
      overflow: hidden; cursor: pointer; position: relative;
      opacity: .55; transition: opacity .15s;
      border: 2px solid transparent;
    }
    .gallery-thumb.active { opacity: 1; border-color: var(--green-mid); }
    .gallery-thumb:hover { opacity: .85; }
    .gallery-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-thumb-placeholder {
      width: 100%; height: 100%; background: var(--surface);
      display: flex; align-items: center; justify-content: center;
    }
    .gallery-thumb-placeholder svg { width: 20px; height: 20px; stroke: var(--border); fill: none; stroke-width: 1.5; }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      z-index: 1000; display: none; align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-img { max-width: 90vw; max-height: 88vh; border-radius: var(--radius); object-fit: contain; }
    .lightbox-close {
      position: absolute; top: 20px; right: 20px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.15); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 18px; transition: background .15s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.25); }
    .lightbox-arrow {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.12); color: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .15s;
    }
    .lightbox-arrow:hover { background: rgba(255,255,255,0.22); }
    .lightbox-arrow svg { width: 18px; height: 18px; stroke: white; fill: none; stroke-width: 2.5; stroke-linecap: round; }
    .lightbox-arrow.prev { left: 20px; }
    .lightbox-arrow.next { right: 20px; }
    .lightbox-counter {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 13px;
    }

    /* ── LISTING HEADER ── */
    .listing-header { margin-bottom: 22px; }
    .listing-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; padding: 4px 12px;
      border-radius: 20px; letter-spacing: .04em; text-transform: uppercase;
    }
    .badge-type-sale   { background: var(--green-dark); color: white; }
    .badge-type-rent   { background: var(--green); color: white; }
    .badge-featured    { background: var(--gold); color: white; }
    .badge-student     { background: #3b82f6; color: white; }
    .badge-luxury      { background: #7c3aed; color: white; }
    .badge-standard    { background: var(--surface); color: var(--text-2); border: 1.5px solid var(--border); }

    .listing-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 3vw, 30px);
      color: var(--text); line-height: 1.25; margin-bottom: 8px;
    }
    .listing-address {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; color: var(--text-3);
    }
    .listing-address svg { width: 14px; height: 14px; stroke: var(--green); fill: none; stroke-width: 2; flex-shrink: 0; }
    .listing-price-row {
      display: flex; align-items: baseline; gap: 10px;
      margin-top: 16px; flex-wrap: wrap;
    }
    .listing-price {
      font-size: 32px; font-weight: 700; color: var(--green-dark); line-height: 1;
    }
    .listing-price-suffix { font-size: 15px; color: var(--text-3); }
    .listing-price-note { font-size: 13px; color: var(--text-3); }

    /* ── KEY SPECS ── */
    .specs-bar {
      display: flex; gap: 0; border-radius: var(--radius-lg);
      border: 1px solid var(--border); background: var(--white);
      overflow: hidden; margin-bottom: 28px;
    }
    .spec-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 5px; padding: 16px 12px; text-align: center;
      border-right: 1px solid var(--border); position: relative;
    }
    .spec-item:last-child { border-right: none; }
    .spec-icon { width: 28px; height: 28px; border-radius: 7px; background: var(--green-light); display: flex; align-items: center; justify-content: center; }
    .spec-icon svg { width: 14px; height: 14px; stroke: var(--green); fill: none; stroke-width: 2; }
    .spec-val { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1; }
    .spec-lbl { font-size: 11px; color: var(--text-3); }

    /* ── SECTION BLOCKS ── */
    .detail-block {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px;
      margin-bottom: 20px;
    }
    .detail-block h3 {
      font-size: 16px; font-weight: 600; color: var(--text);
      margin-bottom: 16px; padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .detail-block h3 svg { width: 16px; height: 16px; stroke: var(--green); fill: none; stroke-width: 2; }

    /* Description */
    .description-text {
      font-size: 14px; color: var(--text-2); line-height: 1.8;
      overflow: hidden; transition: max-height .3s ease;
    }
    .description-text.clamped { max-height: 110px; }
    .read-more {
      margin-top: 10px; font-size: 13px; font-weight: 600;
      color: var(--green); cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
    }
    .read-more svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; transition: transform .2s; }
    .read-more.open svg { transform: rotate(180deg); }

    /* Amenities */
    .amenities-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
    }
    .amenity-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: var(--radius);
      background: var(--surface); font-size: 13px; font-weight: 500; color: var(--text-2);
    }
    .amenity-item svg { width: 15px; height: 15px; stroke: var(--green); fill: none; stroke-width: 2; flex-shrink: 0; }
    .amenity-item.missing { opacity: .4; }
    .amenity-item.missing svg { stroke: var(--text-3); }

    /* Details table */
    .details-table { width: 100%; }
    .details-table tr td {
      padding: 9px 0; font-size: 13px;
      border-bottom: 1px solid var(--surface);
      vertical-align: middle;
    }
    .details-table tr:last-child td { border-bottom: none; }
    .details-table .dt-label { color: var(--text-3); width: 48%; }
    .details-table .dt-val { font-weight: 600; color: var(--text); }

    /* Map */
    .map-container {
      height: 260px; border-radius: var(--radius);
      overflow: hidden; background: #e8e4db; position: relative;
    }
    .map-container iframe { width: 100%; height: 100%; border: none; }
    .map-pin-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%);
      display: flex; flex-direction: column; align-items: center; pointer-events: none;
    }
    .map-pin-overlay svg { width: 32px; height: 32px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
    .map-pin-label {
      background: var(--green-dark); color: white; font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px; white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2); margin-top: 4px;
    }

    /* ── SIMILAR LISTINGS ── */
    .similar-section { margin-top: 32px; }
    .similar-section h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 18px; }
    .similar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .card {
      background: white; border-radius: var(--radius-lg); border: 1px solid var(--border);
      overflow: hidden; transition: transform .2s, box-shadow .2s; cursor: pointer;
    }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .card-img { height: 150px; background: var(--surface); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-img svg { width: 28px; height: 28px; stroke: var(--border); fill: none; stroke-width: 1.5; }
    .card-body { padding: 14px; }
    .card-area { font-size: 10px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }
    .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
    .card-price { font-size: 15px; font-weight: 700; color: var(--green-dark); margin-top: 8px; }

    /* ── SIDEBAR ── */
    .sidebar-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden;
      box-shadow: var(--shadow);
    }
    .sidebar-price-header {
      background: var(--green-dark); padding: 20px 22px;
    }
    .sidebar-price { font-size: 28px; font-weight: 700; color: white; line-height: 1; }
    .sidebar-price-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 4px; }
    .sidebar-price-type {
      display: inline-flex; margin-top: 10px;
      background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9);
      font-size: 11px; font-weight: 600; padding: 3px 12px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .05em;
    }

    /* Enquiry form */
    .enquiry-form { padding: 20px 22px; }
    .enquiry-form h4 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-3); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 13px; color: var(--text);
      background: var(--white); outline: none; transition: border-color .15s;
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--green); box-shadow: 0 0 0 3px rgba(15,110,86,0.08);
    }
    .form-group textarea { min-height: 90px; resize: vertical; line-height: 1.6; }
    .btn-submit {
      width: 100%; padding: 13px; border-radius: var(--radius);
      background: var(--green); color: white; font-size: 14px; font-weight: 600;
      transition: background .15s; cursor: pointer; border: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2; }
    .btn-submit:hover { background: var(--green-dark); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; }
    .btn-whatsapp {
      width: 100%; margin-top: 10px; padding: 12px;
      border-radius: var(--radius); background: #25D366; color: white;
      font-size: 14px; font-weight: 600; cursor: pointer; border: none;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s;
    }
    .btn-whatsapp:hover { background: #1da851; }
    .btn-whatsapp svg { width: 18px; height: 18px; fill: white; }
    .enquiry-divider {
      text-align: center; font-size: 11px; color: var(--text-3);
      margin: 12px 0; position: relative;
    }
    .enquiry-divider::before, .enquiry-divider::after {
      content: ''; position: absolute; top: 50%; width: 38%;
      height: 1px; background: var(--border);
    }
    .enquiry-divider::before { left: 0; }
    .enquiry-divider::after { right: 0; }
    .enquiry-success {
      text-align: center; padding: 20px;
      display: none;
    }
    .enquiry-success svg { width: 44px; height: 44px; stroke: var(--green); fill: none; stroke-width: 1.5; margin: 0 auto 12px; }
    .enquiry-success h4 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .enquiry-success p { font-size: 13px; color: var(--text-3); }

    /* Seller card */
    .seller-card {
      border-top: 1px solid var(--border); padding: 18px 22px;
      display: flex; align-items: center; gap: 14px;
    }
    .seller-avatar {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      background: var(--green-mid); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700;
    }
    .seller-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .seller-since { font-size: 12px; color: var(--text-3); }
    .seller-badge {
      margin-top: 4px; display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600; color: var(--green);
      background: var(--green-light); padding: 2px 8px; border-radius: 10px;
    }
    .seller-badge svg { width: 9px; height: 9px; fill: var(--green); }

    /* Share row */
    .share-row {
      border-top: 1px solid var(--border); padding: 14px 22px;
      display: flex; gap: 8px; align-items: center;
    }
    .share-label { font-size: 12px; color: var(--text-3); font-weight: 500; margin-right: 4px; }
    .share-btn {
      padding: 7px 14px; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid var(--border);
      background: white; color: var(--text-2); transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .share-btn svg { width: 13px; height: 13px; }
    .share-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
    .share-btn.copied { border-color: var(--green); color: var(--green); background: var(--green-light); }

    /* Report link */
    .report-link {
      text-align: center; padding: 10px;
      font-size: 11px; color: var(--text-3);
      border-top: 1px solid var(--border);
    }
    .report-link a { color: var(--text-3); text-decoration: underline; }

    /* ── SKELETON ── */
    .skeleton-wrap { max-width: 1180px; margin: 0 auto; padding: 28px 32px; display: grid; grid-template-columns: 1fr 380px; gap: 32px; }
    .skel { background: linear-gradient(90deg, #f0efe9 25%, #e8e7e1 50%, #f0efe9 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── NOT FOUND ── */
    .not-found {
      max-width: 480px; margin: 80px auto; text-align: center; padding: 0 32px;
    }
    .not-found svg { width: 64px; height: 64px; stroke: var(--border); fill: none; stroke-width: 1.2; margin: 0 auto 20px; }
    .not-found h2 { font-family: 'Playfair Display', serif; font-size: 24px; margin-bottom: 10px; }
    .not-found p { font-size: 14px; color: var(--text-3); margin-bottom: 24px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--text); color: white; padding: 11px 20px;
      border-radius: var(--radius); font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 8px;
      transition: transform .25s; z-index: 2000; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green-dark); }
    .toast svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2.5; }

    /* ── FOOTER ── */
    footer {
      background: var(--text); color: rgba(255,255,255,0.5);
      padding: 28px 32px; text-align: center; font-size: 12px;
    }

<script>

// ── Load listing ──
async function loadListing(id) {
  const { data: listing, error } = await db
    .from('listings')
    .select('*, listing_photos(*), profiles(full_name, created_at, phone)')
    .eq('id', id)
    .single();

  if (error || !listing) { renderNotFound(); return; }

  photos = (listing.listing_photos || []).sort((a, b) => (b.is_cover ? 1 : 0) - (a.is_cover ? 1 : 0));

  document.title = `${listing.title} — NyumbaKisumu`;
  document.getElementById('breadcrumb-title').textContent = listing.title;

  renderListing(listing);
  loadSimilar(listing);
}

// ── Render full listing ──

// ── Gallery navigation ──
function buildMainPhoto(index) {
  if (!photos.length) {
    return `<div class="no-photo">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>No photos uploaded yet</span>
    </div>`;
  }
  return `<img src="${photos[index].url}" alt="Photo ${index+1}" onclick="openLightbox(${index})" style="cursor:zoom-in"/>`;
}

function galleryNav(dir) {
  galleryGoto(currentPhotoIndex + dir);
}

function galleryGoto(index) {
  if (!photos.length) return;
  currentPhotoIndex = Math.max(0, Math.min(photos.length - 1, index));

  const mainEl = document.getElementById('gallery-main');
  const imgEl = mainEl?.querySelector('img');
  if (imgEl) {
    imgEl.src = photos[currentPhotoIndex].url;
    imgEl.setAttribute('onclick', `openLightbox(${currentPhotoIndex})`);
  }

  // Counter
  const counter = document.getElementById('gallery-counter');
  if (counter) counter.textContent = `${currentPhotoIndex + 1} / ${photos.length}`;

  // Arrows
  const prev = document.getElementById('arrow-prev');
  const next = document.getElementById('arrow-next');
  if (prev) prev.classList.toggle('hidden', currentPhotoIndex === 0);
  if (next) next.classList.toggle('hidden', currentPhotoIndex === photos.length - 1);

  // Thumbs
  document.querySelectorAll('.gallery-thumb').forEach((t, i) => {
    t.classList.toggle('active', i === currentPhotoIndex);
  });

  // Scroll thumb into view
  const activeThumb = document.getElementById('thumb-' + currentPhotoIndex);
  activeThumb?.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

// ── Lightbox ──
function openLightbox(index) {
  if (!photos.length) return;
  lightboxIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function closeLightboxOnBg(e) {
  if (e.target === e.currentTarget) closeLightbox();
}
function lightboxNav(dir) {
  lightboxIndex = Math.max(0, Math.min(photos.length - 1, lightboxIndex + dir));
  updateLightbox();
}
function updateLightbox() {
  document.getElementById('lightbox-img').src = photos[lightboxIndex].url;
  document.getElementById('lightbox-counter').textContent = `${lightboxIndex + 1} / ${photos.length}`;
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
});

// ── Description toggle ──
function toggleDesc() {
  const el  = document.getElementById('desc-text');
  const btn = document.getElementById('read-more-btn');
  if (!el) return;
  const clamped = el.classList.toggle('clamped');
  btn.classList.toggle('open', !clamped);
  btn.childNodes[0].textContent = clamped ? 'Read more ' : 'Show less ';
}

// ── Enquiry submit ──
async function submitEnquiry(listingId, sellerId) {
  const name  = document.getElementById('enq-name').value.trim();
  const phone = document.getElementById('enq-phone').value.trim();
  const msg   = document.getElementById('enq-msg').value.trim();

  if (!name)  { showToast('Please enter your name', 'error'); return; }
  if (!phone) { showToast('Please enter your phone number', 'error'); return; }
  if (!msg)   { showToast('Please write a message', 'error'); return; }

  const btn = document.getElementById('btn-enq');
  btn.disabled = true;
  btn.innerHTML = `<div style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite"></div> Sending…`;

  const { error } = await db.from('enquiries').insert({
    listing_id:  listingId,
    seller_id:   sellerId || null,
    buyer_name:  name,
    buyer_phone: phone,
    message:     msg,
  });

  btn.disabled = false;
  btn.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" stroke="white" fill="none" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send enquiry`;

  if (error) {
    showToast('Could not send — please try WhatsApp instead', 'error');
    return;
  }

  // Show success state
  document.getElementById('enquiry-form-wrap').style.display = 'none';
  const successEl = document.getElementById('enquiry-success');
  successEl.style.display = 'block';
  showToast('Enquiry sent successfully!', 'success');
}

// ── Similar listings ──
async function loadSimilar(listing) {
  let { data } = await db
    .from('listings')
    .select('*, listing_photos(*)')
    .eq('status', 'active')
    .eq('area', listing.area)
    .neq('id', listing.id)
    .order('is_featured', { ascending: false })
    .limit(3);

  // Fallback to same category
  if (!data || data.length < 2) {
    const { data: catData } = await db
      .from('listings')
      .select('*, listing_photos(*)')
      .eq('status', 'active')
      .eq('category', listing.category)
      .neq('id', listing.id)
      .limit(3);
    data = catData || [];
  }

  const el = document.getElementById('similar-listings');
  if (!el) return;

  if (!data.length) {
    el.innerHTML = `<p style="font-size:13px;color:var(--text-3);padding:10px 0">No similar listings found yet.</p>`;
    return;
  }

  el.innerHTML = `<div class="similar-grid">
    ${data.map(l => {
      const cover = (l.listing_photos || []).find(p => p.is_cover) || (l.listing_photos || [])[0];
      const imgHtml = cover
        ? `<img src="${cover.url}" alt="${l.title}" loading="lazy"/>`
        : `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
      const price = Number(l.price).toLocaleString('en-KE');
      const suffix = l.price_type === 'rent' ? '/mo' : '';
      return `
        <div class="card" onclick="window.location='listing.html?id=${l.id}'">
          <div class="card-img">${imgHtml}</div>
          <div class="card-body">
            <div class="card-area">${l.area}</div>
            <div class="card-title">${l.title}</div>
            ${l.bedrooms ? `<div style="font-size:12px;color:var(--text-3)">${l.bedrooms} bed${l.bedrooms !== 1 ? 's' : ''}${l.bathrooms ? ' · ' + l.bathrooms + ' bath' : ''}</div>` : ''}
            <div class="card-price">KES ${price}${suffix}</div>
          </div>
        </div>`;
    }).join('')}
  </div>`;
}

// ── Share ──
function shareWhatsApp(title) {
  const url = encodeURIComponent(window.location.href);
  const text = encodeURIComponent(`Check out this listing on NyumbaKisumu: ${decodeURIComponent(title)} — ${window.location.href}`);
  window.open(`https://wa.me/?text=${text}`, '_blank');
}
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('copy-btn');
    if (btn) { btn.textContent = '✓ Copied!'; btn.classList.add('copied'); }
    setTimeout(() => { if (btn) { btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy link`; btn.classList.remove('copied'); }}, 2200);
  });
}

// ── Toast ──
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  clearTimeout(toastTimer);
  t.className = `toast ${type} show`;
  toastTimer = setTimeout(() => t.classList.remove('show'), 3200);
}

// ── Helpers ──
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function floorLabel(n) {
  if (n === 0) return 'Ground floor';
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20) % 10] || s[v] || s[0]) + ' floor';
}
